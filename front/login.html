<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Деталька</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
             <a class="navbar-brand fw-semibold" href="index.html">
            <img src="images/лого.png" alt="Логотип" style="height: 40px; width: auto; display: inline-block; margin-right: 10px;">
             Деталька - магазин автозапчастей
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Корзина (<span id="cartCount">0</span>)</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Вход в аккаунт</h2>
                
                <div id="errorMessage" class="alert alert-danger d-none"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Войти</button>
                </form>
                
                <p class="text-center mt-3">
                    Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Деталька. Все права защищены.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <script>
        // Ждём полной загрузки DOM перед выполнением кода
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM загружен, инициализация страницы входа');
            
            // Обновляем счётчик корзины
            if (typeof updateCartCount === 'function') {
                updateCartCount();
            } else {
                console.warn('updateCartCount не найдена');
            }
            
            // Проверяем, авторизован ли уже пользователь
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user) {
                    console.log('Пользователь уже авторизован, перенаправляем на главную');
                    window.location.href = 'index.html';
                    return;
                }
            }
            
            // Находим форму
            const loginForm = document.getElementById('loginForm');
            if (!loginForm) {
                console.error('Форма с id="loginForm" не найдена!');
                return;
            }
            
            console.log('Форма найдена, добавляем обработчик');
            
            // Добавляем обработчик отправки формы
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Форма отправлена');
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');
                
                console.log('Email:', email);
                
                // Скрываем предыдущую ошибку
                if (errorDiv) {
                    errorDiv.classList.add('d-none');
                }
                
                // Проверяем, что функция loginUser существует
                if (typeof loginUser === 'undefined') {
                    console.error('Функция loginUser не найдена!');
                    if (errorDiv) {
                        errorDiv.textContent = 'Ошибка: функция входа не загружена';
                        errorDiv.classList.remove('d-none');
                    }
                    return;
                }
                
                // Отправляем запрос на вход
                const result = await loginUser(email, password);
                console.log('Результат входа:', result);
                
                if (result.success) {
                    if (typeof showNotification === 'function') {
                        showNotification(`Добро пожаловать, ${result.user.name}!`, 'success');
                    } else {
                        alert(`Добро пожаловать, ${result.user.name}!`);
                    }
                    window.location.href = 'index.html';
                } else {
                    if (errorDiv) {
                        errorDiv.textContent = result.error || 'Ошибка входа';
                        errorDiv.classList.remove('d-none');
                    }
                }
                
            });
            
        });
    </script>
</body>
</html>
