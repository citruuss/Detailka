<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Деталька</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html">
            <img src="images/лого.png" alt="Логотип" style="height: 40px; width: auto; display: inline-block; margin-right: 10px;">
             Деталька - магазин автозапчастей
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Корзина (<span id="cartCount">0</span>)</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Регистрация</h2>
                
                <div id="errorMessage" class="alert alert-danger d-none"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя *</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">Возраст (необязательно)</label>
                        <input type="number" class="form-control" id="age">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль * (мин. 4 символа)</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Зарегистрироваться</button>
                </form>
                
                <p class="text-center mt-3">
                    Уже есть аккаунт? <a href="login.html">Войти</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Деталька. Все права защищены.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <script>
        // Ждём полной загрузки DOM перед выполнением кода
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM загружен, инициализация страницы регистрации');
            
            // Обновляем счётчик корзины
            if (typeof updateCartCount === 'function') {
                updateCartCount();
            }
            
            // Проверяем, авторизован ли уже пользователь
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user) {
                    console.log('Пользователь уже авторизован, перенаправляем на главную');
                    window.location.href = 'index.html';
                    return;
                }
            }
            
            // Находим форму
            const registerForm = document.getElementById('registerForm');
            if (!registerForm) {
                console.error('Форма с id="registerForm" не найдена!');
                return;
            }
            
            console.log('Форма найдена, добавляем обработчик');
            
            // Добавляем обработчик отправки формы
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Форма регистрации отправлена');
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const age = document.getElementById('age').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');
                
                console.log('Имя:', name);
                console.log('Email:', email);
                console.log('Возраст:', age);
                
                // Скрываем предыдущую ошибку
                if (errorDiv) {
                    errorDiv.classList.add('d-none');
                }
                
                // Валидация
                if (!name || !email || !password) {
                    if (errorDiv) {
                        errorDiv.textContent = 'Заполните все обязательные поля';
                        errorDiv.classList.remove('d-none');
                    }
                    return;
                }
                
                if (!email.includes('@')) {
                    if (errorDiv) {
                        errorDiv.textContent = 'Введите корректный email';
                        errorDiv.classList.remove('d-none');
                    }
                    return;
                }
                
                if (password.length < 4) {
                    if (errorDiv) {
                        errorDiv.textContent = 'Пароль должен содержать минимум 4 символа';
                        errorDiv.classList.remove('d-none');
                    }
                    return;
                }
                
                // Проверяем, что функция registerUser существует
                if (typeof registerUser === 'undefined') {
                    console.error('Функция registerUser не найдена!');
                    if (errorDiv) {
                        errorDiv.textContent = 'Ошибка: функция регистрации не загружена';
                        errorDiv.classList.remove('d-none');
                    }
                    return;
                }
                
                // Отправляем запрос на регистрацию
                const result = await registerUser(name, email, password, age || null);
                console.log('Результат регистрации:', result);
                
                if (result.success) {
                    if (typeof showNotification === 'function') {
                        showNotification('Регистрация успешна!', 'success');
                    } else {
                        alert('Регистрация успешна!');
                    }
                    window.location.href = 'index.html';
                } else {
                    if (errorDiv) {
                        errorDiv.textContent = result.error || 'Ошибка регистрации';
                        errorDiv.classList.remove('d-none');
                    }
                }
            });
        });
    </script>
</body>
</html>
